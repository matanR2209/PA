name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  pr-review:
    uses: matanR2209/devtools/.github/workflows/pr-review-reusable.yml@main
    permissions:
      contents: write
      pull-requests: write
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      typescript_blocking: false
      eslint_blocking: false
      claude_blocking: false
